<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F. Lobo</title>
    <link rel="icon" type="image/png" href="content/fabicon.png">
    <link rel="stylesheet" href="assets/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="assets/css/curriculum.css">
</head>
<body>
    <nav class="nav-header">
        <div class="nav-container">
            <a href="curriculum.html" class="nav-link active">Curriculum</a>
            <a href="publications.html" class="nav-link">Publications</a>
            <a href="notes.html" class="nav-link">Notes</a>
        </div>
    </nav>

    <main class="main-content">
        <section class="profile-section">
            <div class="photo-container">
                <img src="content/photo.jpeg" alt="Francisco Lobo" class="profile-photo">
            </div>
            <div class="welcome-text" id="welcome-text"></div>
            <div class="socials-container" id="socials-container"></div>
        </section>

        <div class="section-separator"></div>

        <section class="curriculum-section">
            <div class="controls-container">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search...">
                </div>
                <div class="year-filter">
                    <label>From</label>
                    <input type="number" id="year-from" min="2018" max="2030">
                    <label>to</label>
                    <input type="number" id="year-to" min="2018" max="2030">
                </div>
                <div class="toggle-container">
                    <button class="toggle-btn active" data-type="degree">Degrees</button>
                    <button class="toggle-btn" data-type="contract">Contracts</button>
                    <button class="toggle-btn" data-type="conference">Conferences</button>
                    <button class="toggle-btn" data-type="visit">Visits</button>
                    <button class="toggle-btn" data-type="outreach">Outreach</button>
                </div>
            </div>
            <div class="entries-container" id="entries-container"></div>
        </section>
    </main>

    <script src="assets/js/curriculum.js"></script>
</body>
</html>
